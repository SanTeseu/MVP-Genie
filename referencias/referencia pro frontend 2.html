<!DOCTYPE html>

<html class="h-full" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Gravando - Genie</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Plus Jakarta Sans & Be Vietnam Pro -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
    }
    .font-plus-jakarta {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
<style data-purpose="layout">
    .bg-genie-gradient {
      background: linear-gradient(180deg, #44BDD4 0%, #0D69BA 100%);
    }
    .safe-top {
      padding-top: env(safe-area-inset-top);
    }
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
<style data-purpose="animations">
    @keyframes wave {
      0%, 100% { height: 10px; }
      50% { height: 40px; }
    }
    .wave-bar {
      animation: wave 1.2s ease-in-out infinite;
    }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    .wave-bar:nth-child(6) { animation-delay: 0.5s; }
    .wave-bar:nth-child(7) { animation-delay: 0.6s; }
  </style>
</head>
<body class="h-full overflow-hidden bg-genie-gradient text-white">
<!-- BEGIN: TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/10 backdrop-blur-xl flex justify-between items-center px-6 h-16 safe-top shadow-[0_8px_30px_rgb(3,50,76,0.04)]" data-purpose="top-navigation">
<button aria-label="Menu" class="active:scale-95 duration-200 transition-colors p-2">
<span class="material-icons-outlined text-white text-3xl">menu</span>
</button>
<div class="text-2xl font-black font-plus-jakarta">
      Genie
    </div>
<button aria-label="Search" class="active:scale-95 duration-200 transition-colors p-2">
<span class="material-icons-outlined text-white text-3xl">search</span>
</button>
</header>
<!-- END: TopAppBar -->
<!-- BEGIN: MainContent -->
<main class="h-full flex flex-col items-center justify-center px-8 text-center pt-16 pb-24">
<!-- Status Text -->
<h1 class="text-3xl font-bold mb-12 tracking-tight" data-purpose="recording-status">
      Gravando...
    </h1>
<!-- Recording Visualization Container -->
<div class="relative flex flex-col items-center gap-12">
<!-- Microphone Icon Circle -->
<div class="w-64 h-64 md:w-80 md:h-80 bg-white rounded-full flex items-center justify-center shadow-2xl shadow-sky-900/40" data-purpose="mic-container">
<!-- Microphone Icon Mockup using SVG based on Reference Image 3 -->
<svg class="text-sky-500" fill="none" height="120" viewbox="0 0 24 24" width="120" xmlns="http://www.w3.org/2000/svg">
<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" fill="currentColor"></path>
<path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" fill="currentColor"></path>
<!-- Grid Pattern Detail for Mic Head -->
<circle cx="10.5" cy="5" fill="white" fill-opacity="0.5" r="0.5"></circle>
<circle cx="12" cy="5" fill="white" fill-opacity="0.5" r="0.5"></circle>
<circle cx="13.5" cy="5" fill="white" fill-opacity="0.5" r="0.5"></circle>
<circle cx="10.5" cy="7" fill="white" fill-opacity="0.5" r="0.5"></circle>
<circle cx="12" cy="7" fill="white" fill-opacity="0.5" r="0.5"></circle>
<circle cx="13.5" cy="7" fill="white" fill-opacity="0.5" r="0.5"></circle>
</svg>
</div>
<!-- Waveform Visualization -->
<div class="flex items-center justify-center gap-1.5 h-12" data-purpose="voice-waveform">
<div class="w-2 rounded-full bg-white opacity-40"></div>
<div class="w-3.5 h-3.5 rounded-full bg-white"></div>
<div class="w-1.5 h-4 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-8 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-10 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-6 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-12 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-8 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-4 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-6 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-10 bg-white rounded-full wave-bar"></div>
<div class="w-1.5 h-2 bg-white rounded-full wave-bar"></div>
</div>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 h-24 bg-white/10 backdrop-blur-2xl rounded-t-[3rem] safe-bottom shadow-[0_-10px_40px_rgba(0,153,204,0.08)]" data-purpose="bottom-navigation">
<!-- Home Tab -->
<a class="flex flex-col items-center justify-center text-white/50 p-2 hover:text-white transition-colors" data-purpose="nav-item" href="#">
<span class="material-icons-outlined text-3xl">home</span>
</a>
<!-- Active Mic Tab -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-sky-400 to-blue-600 text-white rounded-full p-5 shadow-lg shadow-sky-400/30 -translate-y-6 active:scale-90 transition-all duration-200" data-purpose="nav-item-active" href="#">
<span class="material-icons-outlined text-4xl">mic</span>
</a>
<!-- Reminders Tab -->
<a class="flex flex-col items-center justify-center text-white/50 p-2 hover:text-white transition-colors" data-purpose="nav-item" href="#">
<span class="material-icons-outlined text-3xl">event_repeat</span>
</a>
</nav>
<!-- END: BottomNavBar -->
</body></html>
