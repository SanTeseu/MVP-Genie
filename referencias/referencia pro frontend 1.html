<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lembretes Semanais - Genie</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'plus-jakarta': ['"Plus Jakarta Sans"', 'sans-serif'],
            'be-vietnam': ['"Be Vietnam Pro"', 'sans-serif'],
          },
          colors: {
            'genie-blue': '#0ea5e9',
            'genie-dark-blue': '#0369a1',
          }
        }
      }
    }
  </script>
<style data-purpose="layout">
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .custom-gradient-bg {
      background: linear-gradient(180deg, #57c1e8 0%, #007bbd 50%, #004d8c 100%);
      min-height: 100vh;
    }
    .safe-bottom-padding {
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    .waveform-bar {
      width: 2px;
      background-color: #0ea5e9;
      margin: 0 1px;
      border-radius: 1px;
    }
  </style>
<style data-purpose="animations">
    .active-scale:active {
      transform: scale(0.95);
      transition: transform 0.2s ease;
    }
  </style>
</head>
<body class="font-be-vietnam text-slate-900 custom-gradient-bg">
<!-- BEGIN: TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl shadow-[0_8px_30px_rgb(3,50,76,0.04)] h-16 flex justify-between items-center px-6" data-purpose="main-header">
<button aria-label="Menu" class="text-sky-600 active-scale">
<span class="material-icons text-3xl">menu</span>
</button>
<h1 class="font-plus-jakarta font-black bg-gradient-to-r from-sky-600 to-blue-800 bg-clip-text text-transparent text-2xl tracking-tight">Genie</h1>
<button aria-label="Search" class="text-sky-600 active-scale">
<span class="material-icons text-2xl">search</span>
</button>
</header>
<!-- END: TopAppBar -->
<!-- BEGIN: MainContent -->
<main class="pt-24 pb-32 px-6 flex flex-col items-center max-w-md mx-auto" data-purpose="reminder-list">
<!-- Title Section -->
<section class="w-full text-center mb-6" data-purpose="page-title">
<h2 class="text-white text-2xl font-bold font-plus-jakarta tracking-wide">Lembretes Semanais</h2>
</section>
<!-- BEGIN: ActiveReminderCard -->
<article class="bg-white rounded-[2.5rem] w-full p-6 shadow-xl relative mb-4" data-purpose="active-day-card">
<!-- Date Label -->
<div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#57c1e8] text-white px-6 py-1.5 rounded-full font-bold text-lg shadow-md whitespace-nowrap">
        Sexta-feira 20/03/26
      </div>
<!-- Task List -->
<div class="mt-6 space-y-6">
<!-- Task Item 1 -->
<div class="flex items-center justify-between group" data-purpose="task-item">
<div class="flex flex-col">
<span class="text-sky-600 font-medium text-lg">Banho do cachorro 10:40</span>
</div>
<div class="flex items-center space-x-2">
<button class="text-sky-500 active-scale">
<span class="material-icons text-3xl">play_arrow</span>
</button>
<div class="flex items-end h-6 space-x-0.5">
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-6"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-5"></div>
<div class="waveform-bar h-2"></div>
</div>
</div>
</div>
<!-- Task Item 2 -->
<div class="flex items-center justify-between" data-purpose="task-item">
<div class="flex flex-col">
<span class="text-sky-600 font-medium text-lg">Lavar Roupa 12:30</span>
</div>
<div class="flex items-center space-x-2">
<button class="text-sky-500 active-scale">
<span class="material-icons text-3xl">play_arrow</span>
</button>
<div class="flex items-end h-6 space-x-0.5">
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-5"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-6"></div>
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-4"></div>
</div>
</div>
</div>
<!-- Task Item 3 -->
<div class="flex items-center justify-between" data-purpose="task-item">
<div class="flex flex-col">
<span class="text-sky-600 font-medium text-lg">Ir no Banco 14:40</span>
</div>
<div class="flex items-center space-x-2">
<button class="text-sky-500 active-scale">
<span class="material-icons text-3xl">play_arrow</span>
</button>
<div class="flex items-end h-6 space-x-0.5">
<div class="waveform-bar h-6"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-5"></div>
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-3"></div>
</div>
</div>
</div>
</div>
<!-- Pagination/Indicators -->
<div class="flex justify-center mt-6 space-x-2">
<div class="w-2 h-2 rounded-full bg-sky-200"></div>
<div class="w-2 h-2 rounded-full bg-sky-600"></div>
<div class="w-2 h-2 rounded-full bg-sky-200"></div>
</div>
<!-- Scroll Indicator Track -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 w-1.5 h-3/4 bg-sky-100 rounded-full">
<div class="w-full h-1/4 bg-sky-400 rounded-full"></div>
</div>
</article>
<!-- END: ActiveReminderCard -->
<!-- BEGIN: FutureDaysList -->
<section class="w-full space-y-3" data-purpose="upcoming-days">
<button class="w-full bg-white text-sky-600 font-bold py-4 rounded-full shadow-md active-scale text-xl" data-purpose="day-button">
        Sábado 21/03/26
      </button>
<button class="w-full bg-white text-sky-600 font-bold py-4 rounded-full shadow-md active-scale text-xl" data-purpose="day-button">
        Domingo 22/03/26
      </button>
<button class="w-full bg-white text-sky-600 font-bold py-4 rounded-full shadow-md active-scale text-xl" data-purpose="day-button">
        Segunda-feira 23/03/26
      </button>
<button class="w-full bg-white text-sky-600 font-bold py-4 rounded-full shadow-md active-scale text-xl" data-purpose="day-button">
        Terça-feira 24/03/26
      </button>
</section>
<!-- END: FutureDaysList -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-white/70 backdrop-blur-2xl shadow-[0_-10px_40px_rgba(0,153,204,0.08)] rounded-t-[3rem] pb-safe h-24 flex justify-around items-center px-8" data-purpose="bottom-navigation">
<a aria-label="Home" class="flex flex-col items-center justify-center text-slate-400 active-scale p-2" href="#">
<span class="material-icons text-3xl">home</span>
</a>
<a aria-label="Voice Assistant" class="flex flex-col items-center justify-center bg-gradient-to-br from-sky-400 to-blue-600 text-white rounded-full p-4 shadow-lg shadow-sky-400/30 -translate-y-4 active-scale transition-transform" href="#">
<span class="material-icons text-3xl">mic_none</span>
</a>
<a aria-label="Reminders" class="flex flex-col items-center justify-center text-sky-600 p-2" href="#">
<span class="material-icons text-3xl">event_repeat</span>
</a>
</nav>
<!-- END: BottomNavBar -->
<!-- BEGIN: Scripts -->
<script data-purpose="interactivity">
    // Add simple click feedback for buttons
    document.querySelectorAll('button, a').forEach(el => {
      el.addEventListener('click', (e) => {
        // Interactivity logic would go here
      });
    });
  </script>
<!-- END: Scripts -->
</body></html>
